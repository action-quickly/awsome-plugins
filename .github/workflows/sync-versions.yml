name: Sync Plugin Versions

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update versions
        run: |
          jq -c '.[]' index.json | while IFS= read -r row; do
            id=$(echo "$row" | jq -r '.id')
            repo=$(echo "$row" | jq -r '.repo' | sed 's|https://github.com/||')
            old=$(echo "$row" | jq -r '.version')

            tag=$(gh release view -R "$repo" --json tagName --jq '.tagName' 2>/dev/null) || continue
            new="${tag#v}"

            if [ "$new" != "$old" ]; then
              echo "Updating $id: v$old -> v$new"
              jq --arg id "$id" --arg ver "$new" --arg tag "v$new" \
                '(.[] | select(.id == $id) | .version) |= $ver |
                 (.[] | select(.id == $id) | .path) |= "releases/download/\($tag)/aq-\($id).zip"' \
                index.json > tmp.json && mv tmp.json index.json
            fi
          done

      - name: Commit if changed
        run: |
          git diff --quiet && echo "No changes" || {
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add index.json
            git commit -m "chore: sync plugin versions"
            git push
          }
