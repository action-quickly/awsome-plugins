name: Sync Plugin Versions

on:
  schedule:
    # 每天 UTC 02:00 运行一次
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-versions
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/sync_versions.py index.json

      - name: Commit if changed
        run: |
          git diff --quiet -- index.json && {
            echo "No changes"
            exit 0
          }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.json
          git commit -m "chore: sync plugin versions"
          git push
